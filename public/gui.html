<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #0f1117;
      border: 1px solid #1e2330;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid #1e2330;
    }

    .list {
      display: flex;
      flex-direction: column;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid #1e2330;
      gap: 0.75rem;
    }

    .list-item:last-child { border-bottom: none; }

    .item-left {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: #e2e8f0;
    }

    .item-meta {
      font-size: 0.75rem;
      color: #64748b;
      font-family: monospace;
    }

    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      border-radius: 5px;
      border: 1px solid #1e3a5f;
      background: transparent;
      color: #3b82f6;
      font-size: 0.75rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-open:hover { background: #1e3a5f55; }

    .btn-open--disabled {
      border-color: #1e2330;
      color: #475569;
      pointer-events: none;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot--running {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
      animation: pulse 1.5s infinite;
    }

    .status-dot--stopped { background: #475569; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .empty {
      padding: 2rem;
      text-align: center;
      color: #475569;
      font-size: 0.85rem;
    }

    .status-dot--online {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e88;
      animation: pulse 1.5s infinite;
    }

    .status-dot--offline { background: #475569; }

    .conn-icons { display: inline-flex; align-items: center; gap: 3px; margin-left: auto; margin-right: 0.5rem; }
    .conn-icon { width: 13px; height: 13px; flex-shrink: 0; }
    .conn-icon--wifi { color: #60a5fa; }
    .conn-icon--eth  { color: #4ade80; }

    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem 0.55rem;
      min-width: 5.5rem;
      border-radius: 5px;
      font-size: 0.72rem;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .btn-shutdown {
      border-color: #4a1515;
      color: #f87171;
      background: #2a0a0a;
    }

    .btn-shutdown:hover { background: #4a1515; }

    .btn-wake {
      border-color: #1e4a2a;
      color: #4ade80;
      background: #0a2a10;
    }

    .btn-wake:hover { background: #1e4a2a; }

    .pending-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: #94a3b8;
      min-width: 5.5rem;
    }

    .spinner {
      width: 10px;
      height: 10px;
      border: 2px solid #475569;
      border-top-color: #94a3b8;
      border-radius: 50%;
      flex-shrink: 0;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="card-title">Websites</div>
      <div class="list" id="websites-list">
        <div class="empty">Loading…</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Machines</div>
      <div class="list" id="machines-list">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    async function loadWebsites() {
      const el = document.getElementById('websites-list');
      try {
        const sites = await fetch('/api/websites').then(r => r.json());
        if (!sites.length) { el.innerHTML = '<div class="empty">No websites configured.</div>'; return; }
        el.innerHTML = sites.map(s => `
          <div class="list-item">
            <div class="item-left">
              <div class="status-dot ${s.running ? 'status-dot--running' : 'status-dot--stopped'}"></div>
              <span class="item-name">${s.name}</span>
              <span class="item-meta">:${s.port}</span>
            </div>
            ${s.running
              ? `<a class="btn-open" href="http://${location.hostname}:${s.port}" target="_blank">Open ↗</a>`
              : `<span class="btn-open btn-open--disabled">Open ↗</span>`
            }
          </div>
        `).join('');
      } catch {
        el.innerHTML = '<div class="empty">Failed to load.</div>';
      }
    }

    const WIFI_PATH = 'M1,9L3,11C7.97,6.03 16.03,6.03 21,11L23,9C16.93,2.93 7.08,2.93 1,9M9,17L12,20L15,17C13.35,15.36 10.66,15.36 9,17M5,13L7,15C9.76,12.24 14.24,12.24 17,15L19,13C15.14,9.14 8.87,9.14 5,13Z';
    const ETH_PATH  = 'M7,15H2V9H7V7L12,5L17,7V9H22V15H17V17L12,19L7,17V15M4,13H5V11H4V13M9,13H10V11H9V13M14,13H15V11H14V13M19,13H20V11H19V13Z';

    const pendingActions = {};
    let lastMachines = [];
    let fastPollTimer = null;

    function renderMachines() {
      const el = document.getElementById('machines-list');
      if (!lastMachines.length) { el.innerHTML = '<div class="empty">No machines configured.</div>'; return; }
      el.innerHTML = lastMachines.map(m => {
        const types = m.connection_types || [];
        const connIcons = types.length ? `
          <span class="conn-icons">
            ${types.includes('wifi')     ? `<svg class="conn-icon conn-icon--wifi" viewBox="0 0 24 24" fill="currentColor"><path d="${WIFI_PATH}"/></svg>` : ''}
            ${types.includes('ethernet') ? `<svg class="conn-icon conn-icon--eth"  viewBox="0 0 24 24" fill="currentColor"><path d="${ETH_PATH}"/></svg>`  : ''}
          </span>` : '';

        // Clear pending if action has completed
        if (pendingActions[m.id] === 'shutdown' && !m.online) delete pendingActions[m.id];
        if (pendingActions[m.id] === 'wake'     &&  m.online) delete pendingActions[m.id];

        let btn;
        if (pendingActions[m.id] === 'shutdown') {
          btn = `<span class="pending-label"><span class="spinner"></span>Shutdown in progress...</span>`;
        } else if (pendingActions[m.id] === 'wake') {
          btn = `<span class="pending-label"><span class="spinner"></span>Wake up in progress...</span>`;
        } else if (m.online) {
          btn = `<button class="btn-action btn-shutdown" onclick="machineAction('${m.id}','shutdown')">■ Shutdown</button>`;
        } else if (m.mac) {
          btn = `<button class="btn-action btn-wake" onclick="machineAction('${m.id}','wake')">▶ Wake</button>`;
        } else {
          btn = '';
        }

        return `
        <div class="list-item">
          <div class="item-left">
            <div class="status-dot ${m.online ? 'status-dot--online' : 'status-dot--offline'}"></div>
            <span class="item-name">${m.name}</span>
            <span class="item-meta">${m.ip_address}</span>
          </div>
          ${connIcons}${btn}
        </div>`;
      }).join('');
    }

    async function loadMachines() {
      try {
        lastMachines = await fetch('/api/machines').then(r => r.json());
        renderMachines();
        if (!Object.keys(pendingActions).length && fastPollTimer) {
          clearInterval(fastPollTimer);
          fastPollTimer = null;
        }
      } catch { /* ignore */ }
    }

    async function machineAction(id, action) {
      pendingActions[id] = action;
      renderMachines();
      await fetch(`/api/machines/${id}/${action}`, { method: 'POST' });
      if (fastPollTimer) clearInterval(fastPollTimer);
      fastPollTimer = setInterval(loadMachines, 2000);
    }

    loadWebsites();
    loadMachines();
    setInterval(loadWebsites, 5000);
    setInterval(loadMachines, 10000);
  </script>
</body>
</html>
